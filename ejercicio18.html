<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 18 - Manipulación del DOM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow-sm p-4" style="max-width: 500px; width: 100%;">
        <h1 class="h5 fw-bold text-center mb-2">Agregar y Eliminar Elementos</h1>
        <p class="text-muted text-center small mb-4">Escribe un elemento y agrégalo a la lista.</p>

        <div class="input-group mb-2">
            <input
                type="text"
                id="nuevoElemento"
                class="form-control"
                placeholder="Escribe algo..."
            >
            <button id="agregarBtn" class="btn btn-agregar">Agregar</button>
        </div>
        <div class="invalid-feedback d-block" id="errorMsg" style="display: none !important; font-size: 0.85em;">
            Escribe algo antes de agregar.
        </div>

        <ul id="lista" class="list-group mt-3"></ul>
    </div>

    <script src="js/ejercicio18.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
